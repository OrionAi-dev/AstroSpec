site_name: MCP Secure Context Sharing
site_description: Portable context containers, OpenSpec verification, and MCP-compatible adapters
site_url: https://orionai-dev.github.io/mcp-secure-context-sharing

repo_url: https://github.com/OrionAi-dev/mcp-secure-context-sharing
repo_name: OrionAi-dev/mcp-secure-context-sharing
edit_uri: ""
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - redirects:
      redirect_maps:
        "spec-bdd-context-turn.md": "openspec/context-turn.md"
        "openspec/implementations/@software/README.md": "integrations/bdd/@software/README.md"
        "openspec/implementations/@software/template.md": "integrations/bdd/@software/template.md"
        "openspec/implementations/@software/examples.md": "integrations/bdd/@software/template.md"
        "openspec/implementations/bdd/openspec.core/README.md": "integrations/bdd/openspec.core/README.md"
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
      exclude:
        - api/**
        - overview.md
        - context-containers.md
        - openspec.md
        - mcp-integration.md
        - extensions/**
        - migrations/legacy-openspec/**

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Start here: index.md

  - Framework:
      - Overview: overview.md
      - Context Containers: context-containers.md
      - OpenSpec: openspec.md
      - MCP Integration: mcp-integration.md

  - Extensions:
      - Overview: extensions/retrieval.md
      - Reasoning: extensions/reasoning.md
      - Graph Memory: extensions/graph-memory.md
      - Discovery: extensions/discovery.md

  - Governance:
      - RFC Process: governance/rfc-process.md
      - Compatibility Policy: governance/compatibility-policy.md
      - Release Policy: governance/release-policy.md
      - Maintainers: governance/maintainers.md
      - RFC Template: governance/rfcs/RFC-000-template.md

  - Integrations:
      - BDD:
          - "@software":
              - Overview: integrations/bdd/@software/README.md
              - Adapters:
                  - Behat: integrations/bdd/@software/adapters/behat-mapper.md
                  - Behave: integrations/bdd/@software/adapters/behave-mapper.md
                  - Context Turn Mapper: integrations/bdd/@software/adapters/context-turn-mapper.md
                  - Cucumber: integrations/bdd/@software/adapters/cucumber-mapper.md
                  - JBehave: integrations/bdd/@software/adapters/jbehave-mapper.md
                  - Jest: integrations/bdd/@software/adapters/jest-mapper.md
                  - Karate: integrations/bdd/@software/adapters/karate-mapper.md
                  - Robot: integrations/bdd/@software/adapters/robot-mapper.md
                  - SpecFlow: integrations/bdd/@software/adapters/specflow-mapper.md
              - Template: integrations/bdd/@software/template.md
          - openspec.core:
              - Overview: integrations/bdd/openspec.core/README.md

  - API Reference:
      - Umbrella Framework:
          - "@mcp-secure-context/core": api/core/README.md
          - "@mcp-secure-context/openspec": api/openspec/README.md
          - "@mcp-secure-context/cli": api/cli/README.md
          - "@mcp-secure-context/mcp-adapter": api/mcp-adapter/README.md
          - "@mcp-secure-context/sdk-typescript": api/sdk-typescript/README.md
          - "@mcp-secure-context/extensions-openspec": api/extensions-openspec/README.md
      - Standards:
          - "@openspec/schema": api/openspec-schema/README.md
          - "@openspec/runtime": api/openspec-runtime/README.md
          - "@openspec/kit": api/openspec-kit/README.md
          - "@openspec/cli": api/openspec-cli/README.md
          - "@openspec/retrieval-profile": api/retrieval-profile/README.md
      - Integrations:
          - mindql-core: api/integrations/mindql-core/README.md
          - mindgraphql-core: api/integrations/mindgraphql-core/README.md

  - Legacy:
      - AstroSpec Migration: migrations/legacy-astrospec/README.md
      - OpenSpec Overview: openspec/spec-overview.md
      - Historical BDD Core Alias: spec-bdd-openspec-core.md
